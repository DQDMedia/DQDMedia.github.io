<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Events — Daniel Durgin</title>
<meta name="description" content="Assignment and event coverage by Daniel Durgin of DQD Media — FIFA World Cup, galas, and more. Fast turnaround, captioned and wire-ready files.">
<link rel="canonical" href="https://dqdmedia.com/events/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dqdmedia.com/events/">

<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#161514">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500..700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --paper: #161514; --ink: #ece8e0; --ink-soft: #a8a49b;
    --rule: #2e2c29; --press: #e2524c; --card: #1f1e1c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  img { -webkit-user-select: none; user-select: none; -webkit-user-drag: none; user-drag: none; }
  body { background: var(--paper); color: var(--ink); font-family: "Source Serif 4", Georgia, serif; }
  header {
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
    padding: 20px 24px; border-bottom: 1px solid var(--rule);
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .brand img { width: 32px; height: 32px; }
  .brand span { font-family: "Oswald", sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.02em; text-transform: uppercase; }
  .back { font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; }
  .back:hover { color: var(--press); }
  main { max-width: 1000px; margin: 0 auto; padding: 60px 24px 80px; }
  .page-title { font-family: "Oswald", sans-serif; font-weight: 700; font-size: clamp(30px, 5vw, 44px); text-transform: uppercase; margin-bottom: 8px; }
  .page-sub { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; margin-bottom: 56px; }
  .event-list { display: flex; flex-direction: column; gap: 28px; }
  .event-card {
    position: relative; display: block; text-decoration: none; color: inherit;
    border-radius: 4px; overflow: hidden; height: 320px;
  }
  .event-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .event-card::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(22,21,20,0.05) 40%, rgba(22,21,20,0.88) 100%);
  }
  .event-card .info { position: absolute; left: 0; right: 0; bottom: 0; padding: 22px 26px; z-index: 1; }
  .event-card .loc { font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--press); }
  .event-card h2 { font-family: "Oswald", sans-serif; font-weight: 700; font-size: clamp(20px, 3vw, 28px); text-transform: uppercase; margin-top: 6px; }
  .event-card .date { font-family: "IBM Plex Mono", monospace; font-size: 11.5px; color: var(--ink-soft); margin-top: 6px; letter-spacing: 0.04em; }
  footer { text-align: center; padding: 30px 20px; border-top: 1px solid var(--rule); font-family: "IBM Plex Mono", monospace; font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); }
</style>
<script data-goatcounter="https://dqdmedia.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<header>
  <a class="brand" href="/">
    <img src="/logo.png" alt="DQD Media logo">
    <span>Daniel Durgin</span>
  </a>
  <a class="back" href="/">&larr; All sections</a>
</header>

<main>
  <h1 class="page-title">Events</h1>
  <p class="page-sub">Available for assignment — fast turnaround, captioned &amp; wire-ready files.</p>
  <div class="event-list">
    <a class="event-card" href="/events/morocco-haiti-world-cup/">
      <img src="/photos/events/2026-06-24-morocco-haiti/756A0267-thumb.jpg" alt="Morocco v Haiti — FIFA World Cup">
      <div class="info">
        <div class="loc">Atlanta</div>
        <h2>Morocco v Haiti — FIFA World Cup</h2>
        <div class="date">June 24, 2026</div>
      </div>
    </a>
    <a class="event-card" href="/events/hgtc-foundation-gala/">
      <img src="/photos/events/2024-03-02-hgtc-foundation-gala/756A0147-thumb.jpg" alt="Horry-Georgetown Technical College Foundation Gala">
      <div class="info">
        <div class="loc">Myrtle Beach, SC</div>
        <h2>HGTC Foundation Gala</h2>
        <div class="date">March 2, 2024</div>
      </div>
    </a>
  </div>
</main>

<footer>&copy; 2026 Daniel Durgin / DQD Media<br>All images &copy; the photographer</footer>

</body>
</html>
