  function escAttr(s) { return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
  function thumbOf(img) { return img.replace(/\.jpg$/, "-thumb.jpg"); }

  const grid = document.getElementById("grid");
  PHOTOS.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "shot";
    btn.innerHTML = `<img class="shot-img" src="${thumbOf(s.img)}" srcset="${thumbOf(s.img)} 900w, ${s.img} 2400w" sizes="(max-width: 600px) 100vw, 380px" alt="${escAttr(s.cap)}" loading="lazy">`;
    btn.onclick = () => openLightbox(i);
    grid.appendChild(btn);
  });

  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbCap = document.getElementById("lbCap");
  const lbPrev = document.getElementById("lbPrev");
  const lbNext = document.getElementById("lbNext");
  const lbClose = document.getElementById("lbClose");
  let lbIndex = 0;
  let lbLastFocused = null;

  function closeLightbox() {
    lb.classList.remove("open");
    if (lbLastFocused) { lbLastFocused.focus(); lbLastFocused = null; }
  }
  function showLightboxAt(i) {
    lbIndex = (i + PHOTOS.length) % PHOTOS.length;
    const s = PHOTOS[lbIndex];
    lbImg.src = s.img;
    lbImg.alt = s.cap;
    lbCap.textContent = s.cap;
  }
  function openLightbox(startIndex) {
    lbLastFocused = document.activeElement;
    showLightboxAt(startIndex);
    lb.classList.add("open");
    lbClose.focus();
  }
  lbPrev.onclick = (e) => { e.stopPropagation(); showLightboxAt(lbIndex - 1); };
  lbNext.onclick = (e) => { e.stopPropagation(); showLightboxAt(lbIndex + 1); };
  lbClose.onclick = () => closeLightbox();
  lb.addEventListener("click", (e) => { if (e.target === lb) closeLightbox(); });

  let lbTouchStartX = null;
  lb.addEventListener("touchstart", (e) => { lbTouchStartX = e.changedTouches[0].clientX; }, { passive: true });
  lb.addEventListener("touchend", (e) => {
    if (lbTouchStartX === null) return;
    const dx = e.changedTouches[0].clientX - lbTouchStartX;
    if (Math.abs(dx) > 40) { dx > 0 ? showLightboxAt(lbIndex - 1) : showLightboxAt(lbIndex + 1); }
    lbTouchStartX = null;
  }, { passive: true });

  document.addEventListener("keydown", (e) => {
    if (!lb.classList.contains("open")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") showLightboxAt(lbIndex - 1);
    if (e.key === "ArrowRight") showLightboxAt(lbIndex + 1);
    if (e.key === "Tab") {
      const focusable = [lbClose, lbPrev, lbNext].filter(el => el.offsetParent !== null);
      const idx = focusable.indexOf(document.activeElement);
      e.preventDefault();
      const next = e.shiftKey ? (idx - 1 + focusable.length) % focusable.length : (idx + 1) % focusable.length;
      focusable[next].focus();
    }
  });
</script>
